name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv==0.11.28
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Lint
        run: uv run ruff check src tests && uv run ruff format --check src tests
      - name: Type check
        run: uv run mypy src tests
      - name: Test
        run: uv run pytest --cov-report=term-missing

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run web:lint
      - name: Type check
        run: npm run web:typecheck
      - name: Test
        run: npm run web:test
      - name: Build
        env:
          API_INTERNAL_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_APP_NAME: Kalibr Publisher
          NEXT_PUBLIC_DEFAULT_LOCALE: uz
        run: npm run web:build

  containers:
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - name: Prepare environment
        run: cp .env.example .env
      - name: Build production images
        run: docker compose -f docker-compose.production.yml build api web
