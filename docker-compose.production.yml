name: kalibr-publisher

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    env_file:
      - .env
    environment:
      STORAGE_ROOT: /data/storage
      BACKUP_ROOT: /data/backups
      TEMP_ROOT: /data/tmp
      LOG_ROOT: /data/logs
    expose:
      - "8000"
    volumes:
      - ${KALIBR_DATA_DIR:-/srv/kalibr-publisher}/storage:/data/storage
      - ${KALIBR_DATA_DIR:-/srv/kalibr-publisher}/backups:/data/backups
      - ${KALIBR_DATA_DIR:-/srv/kalibr-publisher}/tmp:/data/tmp
      - ${KALIBR_DATA_DIR:-/srv/kalibr-publisher}/logs:/data/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    env_file:
      - .env
    environment:
      API_INTERNAL_URL: http://api:8000
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true

  caddy:
    image: caddy:2.10.2-alpine
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  caddy-data:
  caddy-config:
