# Render Blueprint — Kalibr Books Publisher (clone for @kalibr_books)
# Deploy: New -> Blueprint -> connect this GitHub repo.
# Two services: API (FastAPI) + Web (Next.js standalone).

services:
  - type: web
    name: kalibr-books-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    dockerfileTarget: production
    plan: starter
    region: frankfurt
    healthCheckPath: /api/v1/health/live
    port: 8000
    envVars:
      - key: APP_ENV
        value: production
      - key: API_DOCS_ENABLED
        value: "false"
      - key: API_CORS_ORIGINS
        value: "https://kalibr-books-web.onrender.com,http://localhost:3000"
      - key: API_ALLOWED_HOSTS
        value: "localhost,127.0.0.1,kalibr-books-api.onrender.com"
      - key: STORAGE_ROOT
        value: /data/storage
      - key: BACKUP_ROOT
        value: /data/backups
      - key: TEMP_ROOT
        value: /data/tmp
      - key: LOG_ROOT
        value: /data/logs
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_DEFAULT_CHANNEL
        value: "@kalibr_books"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-image

  - type: web
    name: kalibr-books-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    dockerfileTarget: production
    plan: starter
    region: frankfurt
    healthCheckPath: /api/health
    port: 3000
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_NAME
        value: Kalibr Books Publisher
      - key: NEXT_PUBLIC_DEFAULT_LOCALE
        value: uz
      # Web talks to the API through its public URL.
      - key: API_INTERNAL_URL
        value: https://kalibr-books-api.onrender.com
