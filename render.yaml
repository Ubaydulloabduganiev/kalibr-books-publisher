# Render Blueprint for the current two-service deployment.
# The API is the data service; all browser requests go through the Next.js gateway.

envVarGroups:
  - name: kalibr-publisher-shared
    envVars:
      - key: INTERNAL_API_KEY
        generateValue: true

services:
  - type: web
    name: kalibr-books-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /api/v1/health/ready
    envVars:
      - fromGroup: kalibr-publisher-shared
      - key: PORT
        value: "10000"
      - key: APP_NAME
        value: Kalibr Publisher
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: 0.1.1
      - key: APP_TIMEZONE
        value: Asia/Tashkent
      - key: API_DOCS_ENABLED
        value: "false"
      - key: API_LOG_FORMAT
        value: json
      - key: API_CORS_ORIGINS
        value: https://kalibr-books-web.onrender.com
      - key: API_ALLOWED_HOSTS
        value: kalibr-books-api.onrender.com,kalibr-books-api,localhost,127.0.0.1
      - key: STORAGE_ROOT
        value: /data/storage
      - key: BACKUP_ROOT
        value: /data/backups
      - key: TEMP_ROOT
        value: /data/tmp
      - key: LOG_ROOT
        value: /data/logs
      - key: MAX_UPLOAD_MB
        value: "100"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_DEFAULT_CHANNEL
        value: "@kalibr_books"
    disk:
      name: kalibr-publisher-data
      mountPath: /data
      sizeGB: 10

  - type: web
    name: kalibr-books-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - fromGroup: kalibr-publisher-shared
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_NAME
        value: Kalibr Publisher
      - key: NEXT_PUBLIC_DEFAULT_LOCALE
        value: uz
      - key: API_INTERNAL_URL
        fromService:
          type: web
          name: kalibr-books-api
          property: hostport
      - key: ADMIN_BASIC_USERNAME
        value: admin
      - key: ADMIN_BASIC_PASSWORD
        sync: false
